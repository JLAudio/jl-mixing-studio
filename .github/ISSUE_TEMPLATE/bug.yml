name: Bug report
description: Report reproducible incorrect behavior
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Provide the smallest reliable sequence.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, architecture, JL Mixing Studio version, and JL Mixing Automation version.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Logs or screenshots
      description: Remove private client, project, and path information before attaching evidence.
  - type: textarea
    id: safety
    attributes:
      label: Data or safety impact
      description: Did this alter files, project metadata, revisions, approvals, or deliveries?
