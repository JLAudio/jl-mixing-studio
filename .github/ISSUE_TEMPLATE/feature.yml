name: Feature proposal
description: Propose a product capability or workflow improvement
title: "[Feature] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Describe the user problem before proposing implementation.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve for a small-studio or home-studio mix engineer?
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: Describe the observable result without prescribing architecture unless necessary.
    validations:
      required: true
  - type: textarea
    id: workflow
    attributes:
      label: Current and proposed workflow
      description: Explain how the user handles this today and how the proposed flow would differ.
    validations:
      required: true
  - type: textarea
    id: compatibility
    attributes:
      label: JL Mixing Automation compatibility
      description: Identify affected commands, project files, schemas, or lifecycle rules.
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: List testable conditions for completion.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives and tradeoffs
      description: Note alternatives considered and any risks.
